# Railway Nixpacks — Laravel 10 + PHP 8.3
# Pasang PHP extensions secara eksplisit agar tidak ada yang kurang

[phases.setup]
nixPkgs = [
    "php83",
    "php83Extensions.pdo",
    "php83Extensions.pdo_mysql",
    "php83Extensions.mbstring",
    "php83Extensions.tokenizer",
    "php83Extensions.xml",
    "php83Extensions.ctype",
    "php83Extensions.fileinfo",
    "php83Extensions.curl",
    "php83Extensions.openssl",
    "php83Extensions.zip",
    "php83Extensions.intl",
    "php83Extensions.gd",
    "php83Packages.composer"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[start]
cmd = "php artisan migrate --force && php -S 0.0.0.0:$PORT -t public"
